name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build
        run: bun x tsc -p tsconfig.json

      - name: Test
        run: bun test ./test/*.test.ts

      - name: Build web
        run: |
          cd web
          bun install
          bun run build

      - name: Verify web build
        run: |
          ls -la dist/
          echo "Web app built successfully"
