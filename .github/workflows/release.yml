name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - os: linux
            arch: x64
            target: x86_64-unknown-linux-gnu
          - os: darwin
            arch: x64
            target: x86_64-apple-darwin
          - os: darwin
            arch: arm64
            target: aarch64-apple-darwin

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Build
        run: |
          bun install
          bun x tsc -p tsconfig.json

      - name: Create bundle
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          BUNDLE_NAME="keating-${VERSION}-${{ matrix.os }}-${{ matrix.arch }}"
          mkdir -p bundle
          cp -r bin dist pi scripts/install bundle/
          cp package.json bundle/
          mv bundle/install/install.sh bundle/install.sh
          rm -rf bundle/install
          tar -czf "${BUNDLE_NAME}.tar.gz" -C bundle .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: keating-${{ matrix.os }}-${{ matrix.arch }}
          path: keating-*.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*.tar.gz
          generate_release_notes: true

  publish-npm:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Build
        run: |
          bun install
          bun x tsc -p tsconfig.json

      - name: Publish to npm
        run: |
          echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > ~/.npmrc
          npm publish --access public
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

  deploy-web:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Railway
        run: |
          echo "Web deployment handled by Railway GitHub integration"
          echo "Connect the repo at https://railway.app to enable auto-deploy"
