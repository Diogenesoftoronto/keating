name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - os: linux
            arch: x64
            target: x86_64-unknown-linux-gnu
          - os: darwin
            arch: x64
            target: x86_64-apple-darwin
          - os: darwin
            arch: arm64
            target: aarch64-apple-darwin

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Build
        run: |
          bun install
          bun x tsc -p tsconfig.json
          bun scripts/copy-core-templates.ts

      - name: Create bundle
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          BUNDLE_NAME="keating-${VERSION}-${{ matrix.os }}-${{ matrix.arch }}"
          STAGE_DIR="${BUNDLE_NAME}"
          mkdir -p "${STAGE_DIR}"
          mkdir -p "${STAGE_DIR}/bin"
          cp bin/keating.js "${STAGE_DIR}/bin/"
          cp -r dist pi scripts/install "${STAGE_DIR}/"
          cp package.json "${STAGE_DIR}/"
          # Bundle node_modules so the tarball is truly standalone
          cp -r node_modules "${STAGE_DIR}/"
          mv "${STAGE_DIR}/install/install.sh" "${STAGE_DIR}/install.sh"
          rm -rf "${STAGE_DIR}/install"
          tar -czf "${BUNDLE_NAME}.tar.gz" "${STAGE_DIR}"

      - name: Verify bundle contents
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          BUNDLE_NAME="keating-${VERSION}-${{ matrix.os }}-${{ matrix.arch }}"
          tar -tzf "${BUNDLE_NAME}.tar.gz" > bundle-files.txt
          grep -Fx "${BUNDLE_NAME}/bin/keating.js" bundle-files.txt
          grep -Fx "${BUNDLE_NAME}/dist/src/cli/main.js" bundle-files.txt
          grep -Fx "${BUNDLE_NAME}/dist/src/pi/hyperteacher-extension.js" bundle-files.txt
          ! grep -F "${BUNDLE_NAME}/bin/.keating/" bundle-files.txt
          ! grep -F "${BUNDLE_NAME}/bin/keating.config.json" bundle-files.txt

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: keating-${{ matrix.os }}-${{ matrix.arch }}
          path: keating-*.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*.tar.gz
          generate_release_notes: true

  publish-npm:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Build
        run: |
          bun install
          cd web
          bun install
          cd ..
          bun x tsc -p tsconfig.json
          bun scripts/copy-core-templates.ts

      - name: Publish to npm
        run: |
          npm pack --ignore-scripts --dry-run --json > npm-pack.json
          node scripts/verify-package-manifest.mjs npm-pack.json
          echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > ~/.npmrc
          npm publish --access public
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

  deploy-web:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Railway
        run: |
          echo "Web deployment handled by Railway GitHub integration"
          echo "Connect the repo at https://railway.app to enable auto-deploy"
