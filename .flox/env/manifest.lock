        "pkg-path": "ripgrep"
      },
      "similarity": {
        "pkg-path": "similarity"
      },
      "typst": {
        "pkg-path": "typst"
      }
    },
    "vars": {
      "NODE_OPTIONS": "--enable-source-maps"
    },
    "hook": {
      "on-activate": "  # Auto-install node dependencies if node_modules is missing\n  if [ ! -d node_modules ]; then\n    echo \"⚙ Installing root dependencies…\"\n    bun install\n  fi\n  if [ ! -d web/node_modules ]; then\n    echo \"⚙ Installing web dependencies…\"\n    cd web && bun install && cd ..\n  fi\n"
    },
    "profile": {
      "common": "  # Keating shortcuts\n  alias k=\"bun src/cli/main.ts\"\n",
      "bash": "  # Tab completions for just\n  eval \"$(just --completions bash)\" 2>/dev/null || true\n",
      "zsh": "  # Tab completions for just\n  eval \"$(just --completions zsh)\" 2>/dev/null || true\n"
    },
    "options": {}
  },
